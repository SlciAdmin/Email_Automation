{% extends "base.html" %}
{% block content %}
<div style="max-width:480px;margin:50px auto">
  <div style="text-align:center;margin-bottom:2rem">
    <div style="font-size:2.5rem;margin-bottom:.5rem">📝</div>
    <h1 style="font-size:1.5rem;font-weight:700">Create Account</h1>
    <p style="color:var(--muted);font-size:.9rem;margin-top:.3rem">SLCI Ticket System</p>
  </div>
  <div class="card">
    <form method="POST">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" class="form-control" name="email" required autofocus placeholder="user@slci.in">
      </div>
      <div class="form-group">
        <label>Password <span style="color:var(--muted);font-weight:400">(min 6 chars)</span></label>
        <input type="password" class="form-control" name="password" minlength="6" required>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" class="form-control" name="confirm_password" required>
      </div>
      <div class="form-group">
        <label>Role</label>
        <select class="form-control" name="role">
          <option value="user">Department User</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <div class="form-group">
        <label>Department</label>
        <select class="form-control" name="department">
          {% for dept in departments %}
          <option value="{{ dept }}">{{ dept }}</option>
          {% endfor %}
        </select>
      </div>
      <button type="submit" class="btn" style="width:100%;justify-content:center;padding:.8rem;margin-top:.5rem">
        Create Account
      </button>
    </form>
    <div style="text-align:center;margin-top:1.2rem;color:var(--muted);font-size:.88rem">
      Already have an account? <a href="{{ url_for('login') }}" style="color:var(--accent)">Sign in</a>
    </div>
  </div>
</div>
{% endblock %}
